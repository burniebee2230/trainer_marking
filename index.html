<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Verification of Competency · Light Rail Driver · Transdev</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #CC0000;
    --red-dark: #A30000;
    --red-tint: #FBE9E9;
    --charcoal: #404040;
    --charcoal-soft: #5C5C5C;
    --ink: #2A2A2A;
    --bg: #F1F2F4;
    --card: #FFFFFF;
    --line: #DADCE0;
    --line-soft: #ECEDEF;
    --muted: #757980;

    --yes: #1E7D43;   --yes-bg: #E3F3E9;
    --no:  #C0291F;   --no-bg:  #FBE7E5;
    --fb:  #C77800;   --fb-bg:  #FCF1DF;

    --st-comp: #1E7D43;  --st-comp-bg: #E3F3E9;
    --st-coach:#C77800;  --st-coach-bg:#FCF1DF;
    --st-nyc:  #C0291F;  --st-nyc-bg: #FBE7E5;
    --st-none: #9499A0;  --st-none-bg:#EEEFF1;

    --out-pass:  #1E7D43; --out-pass-bg:  #E3F3E9;
    --out-coach: #0E6E8C; --out-coach-bg: #E2F1F6;
    --out-req:   #C77800; --out-req-bg:   #FCF1DF;
    --out-stop:  #C0291F; --out-stop-bg:  #FBE7E5;

    --radius: 12px;
    --shadow: 0 1px 2px rgba(16,24,40,.06), 0 1px 3px rgba(16,24,40,.05);
    --font: 'Calibri', 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
  }

  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--ink);
    font-size: 16px;
    line-height: 1.5;
    padding-bottom: 92px;
    -webkit-text-size-adjust: 100%;
  }

  /* ───────── HEADER ───────── */
  .app-header {
    position: sticky; top: 0; z-index: 100;
    background: #fff; border-bottom: 1px solid var(--line);
  }
  .header-bar {
    display: flex; align-items: center; gap: 12px;
    padding: 9px 14px 8px;
  }
  .header-logo { height: 30px; width: auto; display: block; }
  .header-titles { flex: 1; min-width: 0; border-left: 2px solid var(--red); padding-left: 11px; }
  .header-titles h1 { font-size: 12.5px; font-weight: 700; color: var(--charcoal); letter-spacing: .1px; line-height: 1.25; }
  .header-titles p  { font-size: 10.5px; color: var(--muted); margin-top: 1px; }
  .header-saved-btn {
    flex-shrink: 0; background: var(--bg); border: 1px solid var(--line);
    border-radius: 8px; padding: 7px 10px; font-size: 11px; font-weight: 700;
    color: var(--charcoal); cursor: pointer; font-family: inherit;
    display: flex; align-items: center; gap: 5px; min-height: 38px;
  }
  .header-saved-btn:active { background: var(--line-soft); }
  .saved-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--st-none); }
  .saved-dot.on { background: var(--yes); }

  /* progress + jump nav */
  .subbar { padding: 0 14px 8px; }
  .progress-wrap { display: flex; align-items: center; gap: 9px; }
  .progress-track { flex: 1; height: 7px; background: var(--line-soft); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0%; background: var(--red); border-radius: 4px; transition: width .25s ease; }
  .progress-label { font-size: 10.5px; font-weight: 700; color: var(--muted); white-space: nowrap; }
  .jump-nav { display: flex; gap: 6px; margin-top: 8px; overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
  .jump-nav::-webkit-scrollbar { display: none; }
  .jump-btn {
    flex-shrink: 0; font-size: 11px; font-weight: 700; padding: 5px 11px;
    border-radius: 999px; border: 1px solid var(--line); background: #fff;
    color: var(--charcoal-soft); cursor: pointer; font-family: inherit; white-space: nowrap;
  }
  .jump-btn:active { background: var(--bg); }

  /* ───────── LAYOUT ───────── */
  .content { padding: 14px 13px 0; max-width: 680px; margin: 0 auto; }

  .card {
    background: var(--card); border-radius: var(--radius);
    padding: 16px; margin-bottom: 13px; box-shadow: var(--shadow);
  }
  .card-head { display: flex; align-items: flex-start; gap: 11px; margin-bottom: 13px; }
  .card-tag {
    flex-shrink: 0; min-width: 34px; height: 30px; padding: 0 8px; border-radius: 7px;
    background: var(--charcoal); color: #fff; font-size: 12px; font-weight: 800;
    display: flex; align-items: center; justify-content: center; letter-spacing: .3px;
  }
  .card-tag.red { background: var(--red); }
  .card-title { font-size: 14px; font-weight: 700; color: var(--charcoal); line-height: 1.3; }
  .card-sub   { font-size: 11px; color: var(--muted); margin-top: 2px; line-height: 1.4; }

  .section-banner {
    background: var(--charcoal); color: #fff; border-radius: var(--radius) var(--radius) 0 0;
    padding: 11px 15px; margin: 22px 0 0;
  }
  .section-banner.red { background: var(--red); }
  .section-banner h2 { font-size: 14.5px; font-weight: 800; letter-spacing: .2px; }
  .section-banner p { font-size: 11px; opacity: .85; margin-top: 2px; line-height: 1.45; }
  .section-banner + .card { border-radius: 0 0 var(--radius) var(--radius); margin-top: 0; }
  .section-banner + .card.group:first-of-type { border-radius: 0; }

  /* ───────── FORM FIELDS ───────── */
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field.wide { grid-column: 1 / -1; }
  .field label {
    font-size: 10.5px; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: .5px;
  }
  .field input, .field textarea, .field select {
    padding: 9px 11px; border: 1.5px solid var(--line); border-radius: 8px;
    font-size: 15px; font-family: inherit; color: var(--ink); background: var(--bg);
    -webkit-appearance: none; width: 100%;
  }
  .field input:focus, .field textarea:focus, .field select:focus { outline: none; border-color: var(--red); background: #fff; }
  .field textarea { min-height: 70px; resize: vertical; line-height: 1.5; }
  .seg {
    display: flex; gap: 6px; flex-wrap: wrap;
  }
  .seg button {
    flex: 1; min-width: 60px; padding: 9px 6px; border: 1.5px solid var(--line); background: #fff;
    border-radius: 8px; font-size: 12px; font-weight: 700; color: var(--charcoal-soft);
    cursor: pointer; font-family: inherit; min-height: 42px;
  }
  .seg button.on { background: var(--red-tint); border-color: var(--red); color: var(--red-dark); }

  /* ───────── GROUP CARDS / ITEMS ───────── */
  .card.group { margin-bottom: 0; border-radius: 0; border-bottom: 1px solid var(--line-soft); }
  .card.group.last { border-radius: 0 0 var(--radius) var(--radius); border-bottom: none; margin-bottom: 13px; }
  .group-head {
    display: flex; align-items: center; gap: 10px; margin-bottom: 4px;
    flex-wrap: wrap;
  }
  .gid { font-size: 12px; font-weight: 800; color: #fff; background: var(--red); border-radius: 6px; padding: 3px 8px; letter-spacing: .3px; }
  .gtitle { font-size: 13.5px; font-weight: 700; color: var(--charcoal); flex: 1; min-width: 120px; }
  .badge {
    font-size: 10.5px; font-weight: 800; padding: 4px 10px; border-radius: 999px;
    text-transform: uppercase; letter-spacing: .4px; white-space: nowrap;
    background: var(--st-none-bg); color: var(--st-none);
  }
  .badge.comp  { background: var(--st-comp-bg);  color: var(--st-comp); }
  .badge.coach { background: var(--st-coach-bg); color: var(--st-coach); }
  .badge.nyc   { background: var(--st-nyc-bg);   color: var(--st-nyc); }
  .group-hint { font-size: 10.5px; color: var(--muted); margin-bottom: 8px; }

  .item { border-top: 1px solid var(--line-soft); padding: 12px 0 13px; }
  .item:first-of-type { border-top: 1px solid var(--line); margin-top: 2px; }
  .item-text { font-size: 13.5px; line-height: 1.45; margin-bottom: 9px; color: var(--ink); }
  .item-text .qnum { color: var(--red); font-weight: 800; margin-right: 5px; }
  .marks { display: flex; gap: 7px; }
  .mark {
    flex: 1; padding: 9px 4px; border: 2px solid var(--line); background: #fff;
    border-radius: 8px; font-size: 12.5px; font-weight: 800; color: var(--muted);
    cursor: pointer; font-family: inherit; min-height: 44px; transition: all .12s;
    display: flex; align-items: center; justify-content: center;
  }
  .mark.yes.on { background: var(--yes-bg); border-color: var(--yes); color: var(--yes); }
  .mark.no.on  { background: var(--no-bg);  border-color: var(--no);  color: var(--no); }
  .mark.fb.on  { background: var(--fb-bg);  border-color: var(--fb);  color: var(--fb); }

  .ev-note {
    display: none; width: 100%; margin-top: 8px; padding: 8px 10px;
    border: 1.5px solid var(--line); border-radius: 8px; font-size: 13.5px;
    font-family: inherit; color: var(--ink); resize: vertical; min-height: 52px; line-height: 1.45;
    background: var(--bg);
  }
  .ev-note.show { display: block; }
  .ev-note:focus { outline: none; border-color: var(--red); background: #fff; }
  .ev-note.required { border-color: var(--no); background: #FFF8F7; }
  .ev-flag {
    display: none; font-size: 10.5px; font-weight: 700; color: var(--no);
    margin-top: 5px; align-items: center; gap: 4px;
  }
  .ev-flag.show { display: flex; }

  /* ───────── REPEATABLE ROWS (intervention / evidence) ───────── */
  .rowset { display: flex; flex-direction: column; gap: 11px; }
  .rrow {
    border: 1.5px solid var(--line); border-radius: 10px; padding: 11px; background: var(--bg);
    position: relative;
  }
  .rrow .rrow-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .rrow .rrow-grid .wide { grid-column: 1 / -1; }
  .mini-label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 3px; display: block; }
  .rrow input, .rrow textarea {
    width: 100%; padding: 7px 9px; border: 1.5px solid var(--line); border-radius: 7px;
    font-size: 14px; font-family: inherit; background: #fff; color: var(--ink); -webkit-appearance: none;
  }
  .rrow input:focus, .rrow textarea:focus { outline: none; border-color: var(--red); }
  .rrow textarea { resize: vertical; min-height: 44px; line-height: 1.4; }
  .row-del {
    position: absolute; top: 9px; right: 9px; background: #fff; border: 1px solid var(--line);
    border-radius: 6px; width: 26px; height: 26px; cursor: pointer; color: var(--no);
    font-size: 15px; line-height: 1; display: flex; align-items: center; justify-content: center;
  }
  .add-row {
    margin-top: 11px; width: 100%; padding: 11px; border: 1.5px dashed var(--line);
    background: #fff; border-radius: 9px; font-size: 13px; font-weight: 700; color: var(--charcoal-soft);
    cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .add-row:active { background: var(--bg); }

  .ev-auto-row {
    border: 1.5px solid var(--line); border-radius: 10px; padding: 11px; background: #fff; margin-bottom: 10px;
  }
  .ev-auto-head { display: flex; align-items: center; gap: 8px; margin-bottom: 9px; flex-wrap: wrap; }
  .ev-auto-src { font-size: 11px; font-weight: 700; color: var(--charcoal-soft); flex: 1; min-width: 100px; line-height: 1.35; }
  .ev-auto-mark { font-size: 10px; font-weight: 800; padding: 3px 8px; border-radius: 5px; text-transform: uppercase; letter-spacing: .4px; }
  .ev-auto-mark.no { background: var(--no-bg); color: var(--no); }
  .ev-auto-mark.fb { background: var(--fb-bg); color: var(--fb); }
  .ev-empty-note { font-size: 12px; color: var(--muted); padding: 14px 8px; text-align: center; font-style: italic; }

  /* ───────── SAFETY GATE / OUTCOME ───────── */
  .gate-box {
    border: 2px solid var(--line); border-radius: 11px; padding: 13px; margin-bottom: 14px;
    background: var(--bg);
  }
  .gate-box.tripped { border-color: var(--no); background: #FFF6F5; }
  .gate-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .gate-q { font-size: 13px; font-weight: 700; color: var(--charcoal); line-height: 1.4; }
  .gate-sub { font-size: 11px; color: var(--muted); margin-top: 3px; line-height: 1.4; }
  .switch { flex-shrink: 0; width: 52px; height: 30px; border-radius: 999px; background: var(--st-none); border: none; cursor: pointer; position: relative; transition: background .15s; }
  .switch.on { background: var(--no); }
  .switch::after { content: ''; position: absolute; top: 3px; left: 3px; width: 24px; height: 24px; border-radius: 50%; background: #fff; transition: transform .15s; }
  .switch.on::after { transform: translateX(22px); }
  .gate-flagnote { font-size: 11px; color: var(--no); font-weight: 700; margin-top: 9px; display: none; }
  .gate-flagnote.show { display: block; }

  .grp-summary { width: 100%; border-collapse: collapse; margin-bottom: 6px; }
  .grp-summary td { padding: 8px 4px; border-bottom: 1px solid var(--line-soft); font-size: 12.5px; vertical-align: middle; }
  .grp-summary td:first-child { color: var(--charcoal); font-weight: 600; }
  .grp-summary td:last-child { text-align: right; }
  .mini-badge { font-size: 10px; font-weight: 800; padding: 3px 9px; border-radius: 999px; text-transform: uppercase; letter-spacing: .3px; background: var(--st-none-bg); color: var(--st-none); }
  .mini-badge.comp { background: var(--st-comp-bg); color: var(--st-comp); }
  .mini-badge.coach { background: var(--st-coach-bg); color: var(--st-coach); }
  .mini-badge.nyc { background: var(--st-nyc-bg); color: var(--st-nyc); }

  .outcome-banner {
    border-radius: 11px; padding: 16px; margin: 14px 0; border: 2px solid;
    text-align: center;
  }
  .outcome-banner.pass  { border-color: var(--out-pass);  background: var(--out-pass-bg); }
  .outcome-banner.coach { border-color: var(--out-coach); background: var(--out-coach-bg); }
  .outcome-banner.req   { border-color: var(--out-req);   background: var(--out-req-bg); }
  .outcome-banner.stop  { border-color: var(--out-stop);  background: var(--out-stop-bg); }
  .outcome-banner.none  { border-color: var(--line); background: var(--bg); }
  .outcome-eyebrow { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); font-weight: 700; margin-bottom: 5px; }
  .outcome-title { font-size: 20px; font-weight: 900; line-height: 1.15; }
  .outcome-banner.pass .outcome-title  { color: var(--out-pass); }
  .outcome-banner.coach .outcome-title { color: var(--out-coach); }
  .outcome-banner.req .outcome-title   { color: var(--out-req); }
  .outcome-banner.stop .outcome-title  { color: var(--out-stop); }
  .outcome-banner.none .outcome-title  { color: var(--st-none); font-size: 16px; }
  .outcome-why { font-size: 12px; color: var(--charcoal); margin-top: 9px; line-height: 1.5; text-align: left;
    background: rgba(255,255,255,.65); border-radius: 8px; padding: 9px 11px; }
  .outcome-why strong { font-weight: 700; }
  .duties-line { font-size: 12px; color: var(--charcoal); margin-top: 10px; font-weight: 600; }
  .duties-line span { font-weight: 800; }

  .bands { margin-top: 14px; display: flex; flex-direction: column; gap: 8px; }
  .band { border: 1.5px solid var(--line); border-radius: 9px; padding: 10px 12px; opacity: .5; transition: opacity .15s; }
  .band.active { opacity: 1; border-width: 2px; }
  .band.active.pass  { border-color: var(--out-pass);  background: var(--out-pass-bg); }
  .band.active.coach { border-color: var(--out-coach); background: var(--out-coach-bg); }
  .band.active.req   { border-color: var(--out-req);   background: var(--out-req-bg); }
  .band.active.stop  { border-color: var(--out-stop);  background: var(--out-stop-bg); }
  .band-name { font-size: 12.5px; font-weight: 800; color: var(--charcoal); display: flex; align-items: center; gap: 7px; }
  .band-check { font-size: 13px; }
  .band-desc { font-size: 11px; color: var(--charcoal-soft); margin-top: 3px; line-height: 1.45; }

  .duties-pick { margin-top: 16px; }
  .duties-pick > label { font-size: 12px; font-weight: 700; color: var(--charcoal); display: block; margin-bottom: 7px; }

  /* ───────── SIGN-OFF ───────── */
  .declaration { font-size: 12px; color: var(--charcoal-soft); font-style: italic; line-height: 1.5; background: var(--bg); border-left: 3px solid var(--red); padding: 9px 12px; border-radius: 0 8px 8px 0; margin-bottom: 13px; }
  .sig-block { margin-top: 13px; }
  .sig-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
  .sig-head .lbl { font-size: 12.5px; font-weight: 700; color: var(--charcoal); }
  .sig-head .nm { font-size: 11px; color: var(--muted); }
  .sig-wrap { position: relative; }
  .sig-canvas { display: block; width: 100%; height: 130px; touch-action: none; border: 2px solid var(--line); border-radius: 10px; background: #FCFCFD; }
  .sig-canvas.signed { border-color: var(--red); }
  .sig-clear { position: absolute; top: 7px; right: 7px; background: rgba(255,255,255,.92); border: 1px solid var(--line); border-radius: 6px; font-size: 11px; color: var(--muted); cursor: pointer; padding: 4px 9px; font-family: inherit; }
  .sig-hint { font-size: 10.5px; color: var(--muted); text-align: center; margin-top: 4px; }
  .handover { background: var(--fb-bg); border: 1.5px solid var(--fb); border-radius: 8px; padding: 10px 12px; margin: 13px 0 4px; font-size: 12.5px; color: #7A4A00; line-height: 1.45; }

  .ts-note { text-align: center; font-size: 10.5px; color: var(--muted); margin-top: 13px; padding-top: 11px; border-top: 1px solid var(--line-soft); }

  /* ───────── EXPORT BAR ───────── */
  .export-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid var(--line); padding: 9px 13px; z-index: 100; display: flex; gap: 9px; max-width: 680px; margin: 0 auto; }
  .bar-btn { flex: 1; padding: 13px 8px; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; border: none; display: flex; align-items: center; justify-content: center; gap: 7px; min-height: 48px; }
  .bar-btn.ghost { flex: 0 0 auto; background: var(--bg); color: var(--charcoal); border: 1.5px solid var(--line); padding: 13px 16px; }
  .bar-btn.ghost:active { background: var(--line-soft); }
  .bar-btn.primary { background: var(--red); color: #fff; }
  .bar-btn.primary:active { background: var(--red-dark); }

  /* ───────── DRAWER / MODAL ───────── */
  .overlay { position: fixed; inset: 0; background: rgba(20,22,26,.45); z-index: 300; display: none; }
  .overlay.show { display: block; }
  .drawer {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 310; background: #fff;
    border-radius: 16px 16px 0 0; max-height: 86vh; display: none; flex-direction: column;
    max-width: 680px; margin: 0 auto;
  }
  .drawer.show { display: flex; }
  .drawer-handle { width: 38px; height: 4px; background: var(--line); border-radius: 999px; margin: 9px auto 4px; }
  .drawer-head { padding: 6px 16px 12px; border-bottom: 1px solid var(--line-soft); }
  .drawer-head h3 { font-size: 16px; font-weight: 800; color: var(--charcoal); }
  .drawer-head p { font-size: 11.5px; color: var(--muted); margin-top: 2px; }
  .drawer-body { overflow-y: auto; padding: 13px 16px; -webkit-overflow-scrolling: touch; }
  .draft-item { border: 1.5px solid var(--line); border-radius: 10px; padding: 12px; margin-bottom: 10px; }
  .draft-item.current { border-color: var(--red); background: var(--red-tint); }
  .draft-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .draft-name { font-size: 14px; font-weight: 800; color: var(--charcoal); }
  .draft-meta { font-size: 11px; color: var(--muted); margin-top: 2px; line-height: 1.5; }
  .draft-outcome { font-size: 10px; font-weight: 800; padding: 3px 8px; border-radius: 5px; text-transform: uppercase; letter-spacing: .3px; white-space: nowrap; }
  .draft-actions { display: flex; gap: 8px; margin-top: 11px; }
  .draft-btn { flex: 1; padding: 9px; border-radius: 8px; font-size: 12.5px; font-weight: 700; cursor: pointer; font-family: inherit; border: 1.5px solid var(--line); background: #fff; color: var(--charcoal); }
  .draft-btn.resume { background: var(--charcoal); color: #fff; border-color: var(--charcoal); }
  .draft-btn.danger { flex: 0 0 auto; color: var(--no); border-color: var(--no-bg); }
  .draft-empty { text-align: center; color: var(--muted); font-size: 13px; padding: 26px 12px; line-height: 1.6; }
  .drawer-foot { border-top: 1px solid var(--line-soft); padding: 12px 16px; display: flex; flex-direction: column; gap: 9px; }
  .foot-row { display: flex; gap: 9px; }
  .foot-btn { flex: 1; padding: 12px; border-radius: 9px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; border: 1.5px solid var(--line); background: #fff; color: var(--charcoal); display: flex; align-items: center; justify-content: center; gap: 6px; }
  .foot-btn.red { background: var(--red); color: #fff; border-color: var(--red); }

  .toast { position: fixed; bottom: 104px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--charcoal); color: #fff; padding: 11px 18px; border-radius: 999px; font-size: 13px; font-weight: 600; z-index: 400; opacity: 0; transition: all .25s; pointer-events: none; white-space: nowrap; box-shadow: 0 6px 20px rgba(0,0,0,.25); }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ───────── PRINT (iOS-native, no popup) ───────── */
  #print-view { display: none; }
  @media print {
    .app-header, .content, .export-bar, .overlay, .drawer, .toast { display: none !important; }
    #print-view { display: block !important; }
    @page { size: A4; margin: 13mm 13mm 16mm; }
  }
</style>

/* ════════════════════════════════════════════════════
   COMPETENCY ENGINE
   ════════════════════════════════════════════════════ */

function groupKeys(g) { return g.items.map((_, i) => `${g.id}-${i}`); }

function groupStatus(g) {
  const keys = groupKeys(g);
  const vals = keys.map(k => state.marks[k]);
  if (vals.some(v => v === 'No')) return 'nyc';
  const fb = vals.filter(v => v === 'FB').length;
  if (fb >= 2) return 'nyc';
  if (vals.some(v => !v)) return 'incomplete';
  if (fb === 1) return 'coach';
  return 'comp'; // all Yes
}

function allMarked() {
  const aKeys = PART_A.flatMap(groupKeys);
  const bKeys = PART_B.map((_,i)=>`B-${i}`);
  const cKeys = PART_C.map((_,i)=>`C-${i}`);
  return [...aKeys,...bKeys,...cKeys].every(k => state.marks[k]);
}

function markedCount() {
  return Object.values(state.marks).filter(Boolean).length;
}

function safetyGateTripped() {
  return state.csf || state.interventions.length > 0;
}

// returns { code, triggers:[...] }
function overallOutcome() {
  if (safetyGateTripped()) {
    const t = [];
    if (state.interventions.length > 0) t.push(`${state.interventions.length} assessor intervention${state.interventions.length>1?'s':''} recorded`);
    if (state.csf) t.push('Critical Safety Failure flagged');
    return { code: 'stop', triggers: t };
  }

  if (!allMarked()) {
    return { code: 'incomplete', triggers: [`${TOTAL_ITEMS - markedCount()} item(s) still unmarked`] };
  }

  const statuses = PART_A.map(g => ({ id: g.id, title: g.title, s: groupStatus(g) }));
  const nyc = statuses.filter(x => x.s === 'nyc');
  const coachGroups = statuses.filter(x => x.s === 'coach');
  const cNo = PART_C.map((_,i)=>state.marks[`C-${i}`]).filter(v=>v==='No').length;
  const bNo = PART_B.map((_,i)=>state.marks[`B-${i}`]).filter(v=>v==='No').length;

  // Requires further coaching
  const reqTriggers = [];
  nyc.forEach(x => reqTriggers.push(`${x.id} Not Yet Competent`));
  if (coachGroups.length >= 3) reqTriggers.push(`${coachGroups.length} Part A groups at Coaching`);
  if (cNo > 0) reqTriggers.push(`${cNo} Part C question(s) marked No`);
  if (bNo >= 2) reqTriggers.push(`${bNo} Part B items marked No`);
  if (reqTriggers.length > 0) return { code: 'req', triggers: reqTriggers };

  // Passed with coaching
  const coachTriggers = [];
  if (coachGroups.length >= 1) coachTriggers.push(coachGroups.map(x=>x.id).join(' & ') + (coachGroups.length>1?' at Coaching':' at Coaching (one FB)'));
  const bFb = PART_B.map((_,i)=>state.marks[`B-${i}`]).filter(v=>v==='FB').length;
  const cFb = PART_C.map((_,i)=>state.marks[`C-${i}`]).filter(v=>v==='FB').length;
  if (bNo === 1) coachTriggers.push('1 Part B item marked No');
  if (bFb > 0) coachTriggers.push(`${bFb} Part B coaching point(s)`);
  if (cFb > 0) coachTriggers.push(`${cFb} Part C coaching point(s)`);
  if (coachTriggers.length > 0) return { code: 'coach', triggers: coachTriggers };

  // Passed
  return { code: 'pass', triggers: ['All five Part A groups Competent; nothing marked No or FB across Parts A, B and C'] };
}

const OUTCOME_LABEL = {
  pass:  'Passed',
  coach: 'Passed with coaching',

function recommendedDuties(code) {
  if (code === 'pass' || code === 'coach') return 'yes';
  if (code === 'req') return 'cond';
  if (code === 'stop') return 'no';
  return null;
}
function recommendedAction(code) {

}

function renderInterv() {
  const wrap = document.getElementById('interv-rows');

  if (state.interventions.length === 0) {
    wrap.innerHTML = `<div class="ev-empty-note">No interventions recorded.</div>`;
    return;

  wrap.innerHTML = state.interventions.map((r, i) => `

      </div>
    </div>`).join('');
}

function addInterv() { state.interventions.push({time:'',location:'',reason:'',ref:''}); renderInterv(); updateLive(); save(); }
function delInterv(i) { state.interventions.splice(i,1); renderInterv(); updateLive(); save(); }
function updInterv(i,f,v) { state.interventions[i][f]=v; save(); }

// Auto evidence rows from No/FB items + manual extra
function renderEvidence() {
  // auto rows
  const auto = document.getElementById('evidence-auto');
  if (auto) {
    const rows = [];
    const pushIf = (key, label) => {
      const m = state.marks[key];
      if (m === 'No' || m === 'FB') rows.push({ key, label, m });
    };
    PART_A.forEach(g => g.items.forEach((t,i)=>pushIf(`${g.id}-${i}`, `${g.id} · ${t}`)));
    PART_B.forEach((t,i)=>pushIf(`B-${i}`, `Part B · ${t}`));
    PART_C.forEach((t,i)=>pushIf(`C-${i}`, `Part C Q${i+1} · ${t}`));

    if (rows.length === 0) {
      auto.innerHTML = `<div class="ev-empty-note">No items marked No or FB yet. Any you mark will appear here for evidence.</div>`;
    } else {
      auto.innerHTML = rows.map(r => {
        if (!state.evMeta[r.key]) state.evMeta[r.key] = { locTime:'', ref:'' };
        const em = state.evMeta[r.key];
        return `
        <div class="ev-auto-row">

            <span class="ev-auto-mark ${r.m==='No'?'no':'fb'}">${r.m}</span>

          </div>
        </div>`;
      }).join('');
    }
  }
  // extra rows
  const extra = document.getElementById('evidence-extra');
  if (extra) {
    if (state.evidenceExtra.length === 0) {
      extra.innerHTML = `<div class="ev-empty-note">No additional rows.</div>`;
    } else {
      extra.innerHTML = state.evidenceExtra.map((r,i)=>`

function mark(key, val) {
  if (state.marks[key] === val) { delete state.marks[key]; }
  else { state.marks[key] = val; }
  // reflect on buttons
  ['Yes','No','FB'].forEach(v => {
    const btn = document.querySelector(`.mark[data-k="${key}"][data-v="${v}"]`);
    if (btn) btn.classList.toggle('on', state.marks[key] === v);
  });
  refreshNoteState(key);
  updateLive();
  renderEvidence();
  save();
}

function noteEl(key){ return document.getElementById(`note-${key}`); }

function refreshNoteState(key) {
  const m = state.marks[key];
  const el = noteEl(key);
  const flag = document.getElementById(`flag-${key}`);
  if (!el) return;
  const need = (m === 'No' || m === 'FB');
  // show note field if there's a mark needing evidence OR there is already text
  const show = need || (state.notes[key] && state.notes[key].length);
  el.classList.toggle('show', !!show);
  const empty = !el.value.trim();
  el.classList.toggle('required', need && empty);
  if (flag) flag.classList.toggle('show', need && empty);
}

function onNote(key, val) {
  state.notes[key] = val;
  // keep both copies (item note + evidence record textarea) in sync
  const a = noteEl(key);
  if (a && a.value !== val) a.value = val;
  refreshNoteState(key);
  save();
}

function updateDuration() {
  const st = state.meta.startTime, ft = state.meta.finishTime;
  const d = document.getElementById('duration-display');
  if (!d) return;
  if (!st || !ft) { d.textContent = '—'; return; }
  
  // Parse HH:MM format
  const [sh, sm] = st.split(':').map(Number);
  const [fh, fm] = ft.split(':').map(Number);
  
  // Calculate minutes difference
  let sMin = sh * 60 + sm;
  let fMin = fh * 60 + fm;
  
  // Handle case where finish time is next day (or same-day after start)
  if (fMin < sMin) fMin += 24 * 60;
  
  const diffMin = fMin - sMin;
  const hrs = Math.floor(diffMin / 60);
  const mins = diffMin % 60;
  
  d.textContent = hrs > 0 ? `${hrs}h ${mins}m` : (mins > 0 ? `${mins}m` : '0m');
}

function onMeta(f, v) {
  state.meta[f] = v;
  if (f === 'driver') {
    const sn = document.getElementById('sn-driver'); if (sn) sn.textContent = v || 'Driver';
    const so = document.getElementById('so-dName'); if (so && !so.value) {} // leave manual
  }
  if (f === 'assessor') {
    const sn = document.getElementById('sn-assessor'); if (sn) sn.textContent = v || 'Assessor';
  }
  if (f === 'startTime' || f === 'finishTime') {
    updateDuration();
  }
  save();
}

function onSign(f,v){ state.signoff[f]=v; save(); }
function onAction(f,v){ state.action[f]=v; save(); }

const sigCtx = {};
function setupSig(which) {
  const id = 'cvs-' + which;
  const cvs = document.getElementById(id);
  if (!cvs) return;
  const ctx = cvs.getContext('2d');
  let drawing = false, lx=0, ly=0;

  function init() {
    const dpr = window.devicePixelRatio || 1;
    const r = cvs.getBoundingClientRect();
    cvs.width = r.width * dpr; cvs.height = r.height * dpr;
    ctx.scale(dpr, dpr);
    ctx.strokeStyle = '#1A1A1A'; ctx.lineWidth = 2.2; ctx.lineCap='round'; ctx.lineJoin='round';
    // redraw saved signature if present
    if (state.sigImages[which]) {
      const img = new Image();
      img.onload = () => ctx.drawImage(img, 0, 0, r.width, r.height);
      img.src = state.sigImages[which];
      cvs.classList.add('signed');
    }
  }
  function pos(e){ const r=cvs.getBoundingClientRect(); return e.touches?{x:e.touches[0].clientX-r.left,y:e.touches[0].clientY-r.top}:{x:e.clientX-r.left,y:e.clientY-r.top}; }
  function start(e){ e.preventDefault(); drawing=true; const p=pos(e); lx=p.x; ly=p.y; }
  function move(e){ if(!drawing) return; e.preventDefault(); const p=pos(e); ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(p.x,p.y); ctx.stroke(); lx=p.x; ly=p.y; cvs.classList.add('signed'); }
  function end(){ if(!drawing) return; drawing=false; captureSig(which); }

  cvs.addEventListener('mousedown',start); cvs.addEventListener('mousemove',move);
  cvs.addEventListener('mouseup',end); cvs.addEventListener('mouseleave',end);
  cvs.addEventListener('touchstart',start,{passive:false});
  cvs.addEventListener('touchmove',move,{passive:false});
  cvs.addEventListener('touchend',end);

  sigCtx[which] = { cvs, ctx, init };
  setTimeout(init, 60);
}
function captureSig(which){ const o=sigCtx[which]; if(!o) return; try{ state.sigImages[which]=o.cvs.toDataURL('image/png'); save(); }catch(e){} }
function clearSig(which){ const o=sigCtx[which]; if(!o) return; o.ctx.clearRect(0,0,o.cvs.width,o.cvs.height); o.cvs.classList.remove('signed'); state.sigImages[which]=null; save(); }

   PERSISTENCE  (localStorage multi-draft + file)
   ════════════════════════════════════════════════════ */

let saveTimer = null;
function save() { // debounced autosave
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => { writeDraft(false); }, 500);
}
function saveDraft(explicit) { writeDraft(true); if (explicit) toast('Progress saved on this device'); }

let storageAvailable = true;
let inMemoryDrafts = {};  // fallback for when localStorage is blocked

function testStorage() {
  try {
    const t = '__test_' + Date.now();
    localStorage.setItem(t, 'ok');
    localStorage.removeItem(t);
    return true;
  } catch(e) {
    return false;
  }
}

function loadAll() {
  if (!storageAvailable) return Object.assign({}, inMemoryDrafts);
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; }
  catch(e){ return Object.assign({}, inMemoryDrafts); }
}

function writeDraft(markSaved) {
  state.savedAt = Date.now();
  let all;
  try { all = loadAll(); } catch(e){ all = {}; }
  all[state.id] = JSON.parse(JSON.stringify(state));
  
  let success = false;
  if (storageAvailable) {
    try {
      localStorage.setItem(LS_KEY, JSON.stringify(all));
      localStorage.setItem(LAST_KEY, state.id);
      success = true;
    } catch(e) {
      // storage is full or temporarily blocked
      storageAvailable = false;
      inMemoryDrafts = all;  // keep in memory as fallback
      if (markSaved) toast('⚠ Storage blocked. Changes kept in memory only. Clear storage or use normal browsing.');
    }
  } else {
    // already know storage is blocked, keep in memory
    inMemoryDrafts = all;
  }
  
  setSavedDot(success && storageAvailable);
}
function setSavedDot(on){ const d=document.getElementById('saved-dot'); if(d) d.classList.toggle('on', !!on); }

function loadStateInto(s) {
  state = Object.assign(blankState(), s);
  // guard nested objects
  state.meta = Object.assign({driver:'',assessor:'',date:'',lrv:'',run:'',line:'',location:'',startTime:'',finishTime:''}, s.meta||{});
  state.marks = s.marks||{}; state.notes = s.notes||{}; state.evMeta = s.evMeta||{};
  state.interventions = s.interventions||[]; state.evidenceExtra = s.evidenceExtra||[];
  state.action = Object.assign({areas:'',training:'',reassessment:''}, s.action||{});
  state.signoff = Object.assign({aName:'',aDate:'',dName:'',dDate:''}, s.signoff||{});
  state.sigImages = Object.assign({assessor:null,driver:null}, s.sigImages||{});
  hydrateUI();
}

function hydrateUI() {
  render();
  // fill meta
  const set = (id,v)=>{ const e=document.getElementById(id); if(e) e.value=v||''; };
  set('m-driver',state.meta.driver); set('m-assessor',state.meta.assessor); set('m-date',state.meta.date);
  set('m-line',state.meta.line); set('m-lrv',state.meta.lrv); set('m-run',state.meta.run); set('m-location',state.meta.location);
  set('m-startTime',state.meta.startTime); set('m-finishTime',state.meta.finishTime);
  // marks + notes
  Object.keys(state.marks).forEach(k=>{
    const v=state.marks[k];
    const btn=document.querySelector(`.mark[data-k="${k}"][data-v="${v}"]`);
    if(btn) btn.classList.add('on');
  });
  Object.keys(state.notes).forEach(k=>{ const el=noteEl(k); if(el){ el.value=state.notes[k]; } });
  PART_A.flatMap(groupKeys).concat(PART_B.map((_,i)=>`B-${i}`)).concat(PART_C.map((_,i)=>`C-${i}`)).forEach(refreshNoteState);
  // sign-off
  set('so-aName',state.signoff.aName); set('so-aDate',state.signoff.aDate);
  set('so-dName',state.signoff.dName); set('so-dDate',state.signoff.dDate);
  set('comments',state.comments);
  set('ap-areas',state.action.areas); set('ap-training',state.action.training); set('ap-reassessment',state.action.reassessment);
  const snD=document.getElementById('sn-driver'); if(snD) snD.textContent=state.meta.driver||'Driver';
  const snA=document.getElementById('sn-assessor'); if(snA) snA.textContent=state.meta.assessor||'Assessor';
  // csf switch
  const sw=document.getElementById('csf-switch'); if(sw) sw.classList.toggle('on', state.csf);
  // dynamic sections
  renderInterv(); renderEvidence(); updateLive();
  setupSig('assessor'); setupSig('driver');
  setSavedDot(!!state.savedAt);
  updateDuration();
}

/* ── Drafts drawer ── */
function openDrawer() {
  // update storage status note

  if (statusNote) {
    if (storageAvailable) {
      statusNote.textContent = 'Stored on this device. Use a file to move a draft to another phone.';
    } else {
      statusNote.textContent = '⚠ Storage blocked (private mode?). Drafts kept in memory — they will be lost if you close this tab.';
      statusNote.style.color = '#C0291F';
      statusNote.style.fontWeight = '600';

  }
  renderDrafts();
  document.getElementById('overlay').classList.add('show');
  document.getElementById('drawer').classList.add('show');

function closeDrawer() {
  document.getElementById('overlay').classList.remove('show');

}
function renderDrafts() {
  const all = loadAll();
  const ids = Object.keys(all).sort((a,b)=>(all[b].savedAt||0)-(all[a].savedAt||0));
  const body = document.getElementById('drawer-body');
  if (ids.length === 0) {
    body.innerHTML = `<div class="draft-empty">No saved assessments yet.<br>Your current work autosaves as you go.</div>`;

  body.innerHTML = ids.map(id => {

    const marked = d.marks ? Object.values(d.marks).filter(Boolean).length : 0;
    return `<div class="draft-item ${isCur?'current':''}">
      <div class="draft-top">

          <div class="draft-name">${esc(d.meta&&d.meta.driver?d.meta.driver:'Unnamed driver')}${isCur?' · current':''}</div>

        </div>

      </div>
      <div class="draft-actions">
        <button class="draft-btn resume" onclick="resumeDraft('${id}')">${isCur?'Reopen':'Resume'}</button>
        <button class="draft-btn danger" onclick="deleteDraft('${id}')">Delete</button>
      </div>
    </div>`;
  }).join('');
}
function draftOutcome(d) {
  // lightweight recompute for the badge without disturbing live state
  const tmp = state; state = Object.assign(blankState(), d);
  state.meta=d.meta||{}; state.marks=d.marks||{}; state.interventions=d.interventions||[]; state.csf=!!d.csf;
  const o = overallOutcome().code; state = tmp; return o;
}
function resumeDraft(id) {
  const all = loadAll();
  if (!all[id]) return;
  loadStateInto(all[id]);
  closeDrawer();
  toast('Assessment loaded');
  window.scrollTo({top:0,behavior:'smooth'});
}
function deleteDraft(id) {
  if (!confirm('Delete this saved assessment? This cannot be undone.')) return;
  const all = loadAll();
  delete all[id];
  if (storageAvailable) {
    try { localStorage.setItem(LS_KEY, JSON.stringify(all)); } catch(e){}
  } else {
    inMemoryDrafts = all;
  }
  if (id === state.id) { state = blankState(); hydrateUI(); }
  renderDrafts();
  toast('Deleted');
}
function newAssessment() {
  if (!confirm('Start a new blank assessment? Your current one is already saved and can be reopened from this list.')) return;
  writeDraft(true);          // ensure current is stored
  state = blankState();
  hydrateUI();
  closeDrawer();
  window.scrollTo({top:0,behavior:'smooth'});

}

/* ── File export / import ── */
function exportFile() {
  writeDraft(true);
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const nm = (state.meta.driver||'driver').replace(/[^a-z0-9]+/gi,'_');
  const dt = state.meta.date || new Date().toISOString().slice(0,10);
  a.href = url; a.download = `VoC_${nm}_${dt}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
  toast('Saved to file');
}
function importFile(ev) {
  const file = ev.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const s = JSON.parse(e.target.result);
      if (!s || !s.marks) throw new Error('bad');
      s.id = s.id || ('voc_'+Date.now());
      loadStateInto(s);
      writeDraft(true);
      closeDrawer();
      toast('Assessment loaded from file');
      window.scrollTo({top:0,behavior:'smooth'});
    } catch(err) { alert('That file could not be read as a saved VoC assessment.'); }
  };
  reader.readAsText(file);
  ev.target.value = '';
}

  const fimgs = Array.from(fdoc.images || []);
  const ready = fimgs.map(img => {
    if (typeof img.decode === 'function') return img.decode().catch(() => {});
    if (img.complete) return Promise.resolve();
    return new Promise(res => { img.onload = img.onerror = () => res(); });
  });
  let fired = false;
  const go = () => {
    if (fired) return; fired = true;
    requestAnimationFrame(() => requestAnimationFrame(fireFramePrint));
  };
  Promise.all(ready).then(go);
  setTimeout(go, 900);                                                   // always fires
  setTimeout(() => { const f = document.getElementById('print-frame'); if (f) f.remove(); }, 60000);
}

document.addEventListener('DOMContentLoaded', () => {
  // test if localStorage is available
  if (!testStorage()) {
    storageAvailable = false;
    toast('⚠ Storage unavailable (private mode?). Drafts kept in memory only.');
  }
  
  // resume last draft if present, else start fresh
  let resumed = false;
  try {
    const lastId = storageAvailable ? localStorage.getItem(LAST_KEY) : Object.keys(inMemoryDrafts)[0];
    const all = loadAll();
    if (lastId && all[lastId]) { loadStateInto(all[lastId]); resumed = true; }
  } catch(e){}
  if (!resumed) {
    state = blankState();
    state.meta.date = new Date().toISOString().slice(0,10);
    hydrateUI();
  }
});
</script>
